name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify
      - name: Check generated evidence is committed
        run: |
          status="$(git status --porcelain --untracked-files=all -- artifacts/evidence)"
          if [ -n "$status" ]; then
            printf '%s\n' "$status"
            exit 1
          fi
      - name: Install browser runtimes
        run: npx playwright install --with-deps chromium webkit
      - run: npm run test:browser
