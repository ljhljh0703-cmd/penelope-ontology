name: deployment-smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: HTTPS deployment origin to verify
        required: true
        type: string
      expected_sha:
        description: Exact 40-character Git commit SHA deployed at that origin
        required: true
        type: string

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - run: node scripts/smoke-deployment.mjs
        env:
          DEPLOYMENT_URL: ${{ inputs.base_url }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
